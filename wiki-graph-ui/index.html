<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f1115" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>labs-wiki graph</title>
<link rel="stylesheet" href="styles.css?v=__BUILD_ID__" />
</head>
<body>
<button id="sidebar-toggle" class="icon-btn" aria-label="Toggle controls" aria-controls="sidebar" aria-expanded="false">
  <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/></svg>
</button>
<div id="sidebar-backdrop" hidden></div>
<aside id="sidebar">
  <header>
    <h1>labs-wiki graph</h1>
    <div id="stats" class="muted">loading…</div>
    <button id="sidebar-close" class="icon-btn sidebar-close" aria-label="Close controls">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.3 19.71 2.88 18.29 9.17 12 2.88 5.71 4.3 4.29l6.29 6.3 6.3-6.3z"/></svg>
    </button>
  </header>

  <section>
    <label for="ask-graph">Ask the graph</label>
    <input id="ask-graph" type="search" placeholder="Natural-language query (Enter)" autocomplete="off" />
    <button id="ask-graph-clear" class="secondary hidden" type="button">Clear results</button>
  </section>

  <section>
    <label for="search">Search</label>
    <input id="search" type="search" placeholder="Filter nodes by title or tag" autocomplete="off" />
  </section>

  <section>
    <label for="type-filter">Type</label>
    <select id="type-filter">
      <option value="">(any)</option>
    </select>
  </section>

  <section>
    <label for="tier-filter">Tier</label>
    <select id="tier-filter">
      <option value="">(any)</option>
      <option value="hot">hot</option>
      <option value="established">established</option>
      <option value="core">core</option>
      <option value="workflow">workflow</option>
    </select>
  </section>

  <section>
    <label for="community-filter">Community</label>
    <select id="community-filter">
      <option value="">(any)</option>
    </select>
  </section>

  <section>
    <label for="checkpoint-class-filter">Checkpoint class</label>
    <select id="checkpoint-class-filter">
      <option value="">all</option>
      <option value="planning">planning</option>
      <option value="executed">executed</option>
      <option value="validated">validated</option>
      <option value="recurring">recurring</option>
      <option value="incident">incident</option>
    </select>
  </section>

  <section>
    <label><input type="checkbox" id="stale-only-toggle" /> Stale only (no last_verified or &gt; 90d)</label>
  </section>

  <section>
    <label><input type="checkbox" id="surprises-toggle" /> Highlight cross-community edges</label>
  </section>

  <section>
    <button id="clear-filters" class="secondary">Clear filters</button>
  </section>

  <section id="ask-results" class="hidden">
    <h3>Ask results</h3>
    <div class="muted" id="ask-meta"></div>
    <ol id="ask-results-list"></ol>
  </section>

  <section id="node-panel" class="hidden" aria-label="Node details">
    <div id="node-panel-handle" aria-hidden="true"></div>
    <div class="node-panel-head">
      <div class="node-panel-copy">
        <h2 id="node-title"></h2>
        <div class="muted" id="node-meta"></div>
      </div>
      <button id="node-panel-close" class="icon-btn node-panel-close" aria-label="Close node details">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.3 19.71 2.88 18.29 9.17 12 2.88 5.71 4.3 4.29l6.29 6.3 6.3-6.3z"/></svg>
      </button>
    </div>
    <div class="node-tabs" role="tablist">
      <button class="node-tab active" data-tab="overview" role="tab" aria-selected="true">Overview</button>
      <button class="node-tab" data-tab="content" role="tab" aria-selected="false">Content</button>
      <button class="node-tab" data-tab="neighbors" role="tab" aria-selected="false">Neighbors</button>
    </div>
    <div class="node-tab-panels">
      <div class="node-tab-panel active" data-panel="overview">
        <p id="node-summary"></p>
        <dl id="node-fm" class="node-fm"></dl>
      </div>
      <div class="node-tab-panel" data-panel="content">
        <article id="node-content" class="node-content muted">Tap to load…</article>
      </div>
      <div class="node-tab-panel" data-panel="neighbors">
        <ul id="node-neighbors"></ul>
      </div>
    </div>
  </section>

  <section id="checkpoint-detail" class="hidden">
    <h3>Checkpoint disagreement</h3>
    <div id="checkpoint-detail-body" class="muted">Click a ringed node to inspect.</div>
  </section>

  <footer>
    <button id="rebuild-btn" class="secondary">Reload graph</button>
    <div class="muted" id="connection-state">connecting…</div>
  </footer>
</aside>

<main id="canvas-host">
  <canvas id="graph"></canvas>
  <div id="view-controls" aria-label="Graph view controls">
    <div id="zoom-level" class="view-pill">35%</div>
    <button id="zoom-in" class="icon-btn" aria-label="Zoom in">+</button>
    <button id="zoom-out" class="icon-btn" aria-label="Zoom out">−</button>
    <button id="zoom-fit" class="icon-btn view-fit-btn" aria-label="Fit graph to viewport">Fit</button>
    <button id="path-mode-toggle" class="icon-btn view-fit-btn" aria-label="Toggle path mode" aria-pressed="false">Path</button>
    <button id="checkpoint-health-toggle" class="icon-btn view-fit-btn" aria-label="Toggle checkpoint health view" aria-pressed="false">Health</button>
  </div>
  <div id="path-panel" class="hidden" aria-live="polite">
    <div class="path-panel-head">
      <strong id="path-panel-title">Path mode</strong>
      <button id="path-panel-close" class="icon-btn node-panel-close" aria-label="Exit path mode">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M18.3 5.71 12 12l6.3 6.29-1.41 1.42L10.59 13.4 4.3 19.71 2.88 18.29 9.17 12 2.88 5.71 4.3 4.29l6.29 6.3 6.3-6.3z"/></svg>
      </button>
    </div>
    <div id="path-panel-body" class="muted">Click a node to set the start.</div>
  </div>
  <div id="legend" class="legend muted"></div>
</main>

<script src="config.js"></script>
<script src="app.js?v=__BUILD_ID__" type="module"></script>
</body>
</html>
