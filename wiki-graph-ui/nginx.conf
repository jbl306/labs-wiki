server {
    listen 3000 default_server;
    listen [::]:3000 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers — Cloudflare sits in front for public, Caddy for LAN.
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy same-origin;

    # The SPA is small and re-deploys often (zero hashed-asset pipeline).
    # Force every asset to revalidate via ETag so browsers never serve
    # stale JS/CSS after a deploy. ETags still produce cheap 304s.
    etag on;
    add_header Cache-Control "no-cache" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # config.js is rewritten at container start with the public API URL —
    # never cache it, even via revalidation.
    location = /config.js {
        add_header Cache-Control "no-store" always;
    }

    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok"}';
    }
}
